<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Alterations Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .view { display: none; }
    .view.active { display: block; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900" style="max-width:480px;margin:0 auto;">

  <!-- Header -->
  <div class="bg-white border-b px-4 py-3 flex items-center sticky top-0 z-10 gap-3">
    <button id="backBtn" onclick="goBack()" class="text-blue-500 text-sm font-medium hidden w-12">← Back</button>
    <h1 id="pageTitle" class="font-semibold text-base flex-1 text-center">Dashboard</h1>
    <div class="w-12"></div>
  </div>

  <!-- Content -->
  <div class="pb-24 px-4">

    <!-- ── Dashboard ───────────────────────────────────────────────────── -->
    <div id="view-dashboard" class="view active pt-4">
      <button onclick="showView('newJob')"
        class="w-full bg-blue-500 text-white rounded-2xl py-3.5 font-semibold mb-5 text-sm">
        + New Job
      </button>

      <div id="readySection" class="mb-5 hidden">
        <p class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-2">Ready for Pickup</p>
        <div id="readyList"></div>
      </div>

      <div class="mb-5">
        <p class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-2">In Progress</p>
        <div id="inProgressList"></div>
      </div>

      <div id="pickedUpSection" class="mb-5 hidden">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Recently Picked Up</p>
        <div id="pickedUpList"></div>
      </div>
    </div>

    <!-- ── New Job ──────────────────────────────────────────────────────── -->
    <div id="view-newJob" class="view pt-4">
      <form id="newJobForm" onsubmit="submitNewJob(event)" class="space-y-4">

        <div>
          <label class="block text-sm font-medium mb-1">Tag # <span class="text-red-500">*</span></label>
          <input id="job-tagNumber" type="text" required
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Enter tag number">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Customer <span class="text-red-500">*</span></label>
          <input id="job-customerSearch" type="text" autocomplete="off"
            oninput="searchCustomersInline(this.value)"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Search by name or phone">
          <div id="customerDropdown" class="hidden bg-white border border-gray-200 rounded-xl mt-1 overflow-hidden shadow-sm"></div>
          <div id="selectedCustomerBadge" class="hidden mt-2 bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 flex items-center justify-between">
            <div>
              <span id="selCustName" class="text-sm font-medium text-blue-800"></span>
              <span id="selCustPhone" class="text-xs text-blue-600 ml-2"></span>
            </div>
            <button type="button" onclick="clearSelectedCustomer()" class="text-blue-400 text-lg leading-none">×</button>
          </div>
          <button type="button" onclick="showView('newCustomer')"
            class="text-blue-500 text-xs mt-1.5">+ New customer</button>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Description</label>
          <textarea id="job-description" rows="3"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm"
            placeholder="Describe the alterations needed"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Referred From</label>
          <select id="job-referredFrom" onchange="toggleReferredBy()"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm bg-white">
            <option value="">— select —</option>
            <option value="Facebook">Facebook</option>
            <option value="Website">Website</option>
            <option value="Person">Person (word of mouth)</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div id="referredByField" class="hidden">
          <label class="block text-sm font-medium mb-1">Referred by (name)</label>
          <input id="job-referredBy" type="text"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Person's name">
        </div>

        <button type="submit" id="newJobSubmitBtn"
          class="w-full bg-blue-500 text-white rounded-2xl py-3.5 font-semibold text-sm">
          Create Job
        </button>
      </form>
    </div>

    <!-- ── Job Detail ───────────────────────────────────────────────────── -->
    <div id="view-jobDetail" class="view pt-4">
      <div id="jobDetailContent"></div>
    </div>

    <!-- ── Edit Payment ─────────────────────────────────────────────────── -->
    <div id="view-editPayment" class="view pt-4">
      <form onsubmit="submitPayment(event)" class="space-y-4">
        <input type="hidden" id="pay-tagNum">
        <div>
          <label class="block text-sm font-medium mb-1">Amount Paid ($)</label>
          <input id="pay-amount" type="number" step="0.01" min="0"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="0.00">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Payment Method</label>
          <select id="pay-method" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm bg-white">
            <option value="">— select —</option>
            <option>Cash</option>
            <option>Card</option>
            <option>Venmo</option>
            <option>Zelle</option>
            <option>Check</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Tip ($)</label>
          <input id="pay-tip" type="number" step="0.01" min="0"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="0.00">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Date Paid</label>
          <input id="pay-date" type="date"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm">
        </div>
        <button type="submit"
          class="w-full bg-blue-500 text-white rounded-2xl py-3.5 font-semibold text-sm">
          Save Payment
        </button>
      </form>
    </div>

    <!-- ── New Appointment ──────────────────────────────────────────────── -->
    <div id="view-newAppointment" class="view pt-4">
      <form onsubmit="submitNewAppointment(event)" class="space-y-4">
        <input type="hidden" id="appt-tagNum">
        <input type="hidden" id="appt-customerName">
        <div>
          <label class="block text-sm font-medium mb-1">Fitting Type</label>
          <select id="appt-type" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm bg-white">
            <option>Initial Fitting</option>
            <option>Fitting</option>
            <option>Final Fitting</option>
            <option>Pickup</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Date & Time <span class="text-red-500">*</span></label>
          <input id="appt-datetime" type="datetime-local" required
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Notes</label>
          <textarea id="appt-notes" rows="2"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Optional"></textarea>
        </div>
        <button type="submit"
          class="w-full bg-blue-500 text-white rounded-2xl py-3.5 font-semibold text-sm">
          Add to Calendar
        </button>
      </form>
    </div>

    <!-- ── Customers ────────────────────────────────────────────────────── -->
    <div id="view-customers" class="view pt-4">
      <div class="flex gap-2 mb-4">
        <input id="custSearch" type="text" oninput="filterCustomers(this.value)"
          class="flex-1 border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Search...">
        <button onclick="showView('newCustomer')"
          class="bg-blue-500 text-white rounded-xl px-4 py-2.5 text-sm font-semibold">+ New</button>
      </div>
      <div id="customerListEl"></div>
    </div>

    <!-- ── New Customer ─────────────────────────────────────────────────── -->
    <div id="view-newCustomer" class="view pt-4">
      <form id="newCustomerForm" onsubmit="submitNewCustomer(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Name <span class="text-red-500">*</span></label>
          <input id="cust-name" type="text" required
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Full name">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Phone</label>
          <input id="cust-phone" type="tel"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Phone number">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input id="cust-email" type="email"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Email address">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Notes</label>
          <textarea id="cust-notes" rows="2"
            class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Optional notes"></textarea>
        </div>
        <button type="submit"
          class="w-full bg-blue-500 text-white rounded-2xl py-3.5 font-semibold text-sm">
          Add Customer
        </button>
      </form>
    </div>

    <!-- ── Settings ─────────────────────────────────────────────────────── -->
    <div id="view-settings" class="view pt-4 space-y-6">

      <div class="bg-white rounded-2xl border border-gray-200 p-4 space-y-3">
        <p class="text-sm font-semibold">Shop Name</p>
        <p class="text-xs text-gray-500">Used in text messages sent to customers.</p>
        <input id="set-shopName" type="text"
          class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Your shop name">
        <button onclick="saveShopName()"
          class="w-full bg-gray-800 text-white rounded-xl py-2.5 text-sm font-semibold">Save Name</button>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200 p-4 space-y-3">
        <p class="text-sm font-semibold">Twilio SMS</p>
        <p class="text-xs text-gray-500">Get these from your Twilio dashboard at twilio.com.</p>
        <input id="set-twilioSid" type="text"
          class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Account SID">
        <input id="set-twilioToken" type="password"
          class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="Auth Token">
        <input id="set-twilioPhone" type="tel"
          class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm" placeholder="+15551234567">
        <button onclick="saveTwilio()"
          class="w-full bg-gray-800 text-white rounded-xl py-2.5 text-sm font-semibold">Save Twilio Settings</button>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200 p-4 space-y-3">
        <p class="text-sm font-semibold">Initial Setup</p>
        <p class="text-xs text-gray-500">Run once to create your Google Sheet and Alterations calendar.</p>
        <button onclick="runSetup()"
          class="w-full bg-green-600 text-white rounded-xl py-2.5 text-sm font-semibold">Create Sheet & Calendar</button>
      </div>

    </div>

  </div><!-- /content -->

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex" style="max-width:480px;margin:0 auto;">
    <button id="nav-dashboard" onclick="showView('dashboard')"
      class="flex-1 flex flex-col items-center py-2 gap-0.5 text-blue-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-xs">Home</span>
    </button>
    <button id="nav-customers" onclick="showView('customers')"
      class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span class="text-xs">Customers</span>
    </button>
    <button id="nav-settings" onclick="showView('settings')"
      class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span class="text-xs">Settings</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast"
    class="hidden fixed top-16 left-4 right-4 z-50 bg-gray-900 text-white text-sm rounded-2xl px-4 py-3 text-center shadow-lg"
    style="max-width:448px;margin:0 auto;"></div>

  <script>
  // ── State ──────────────────────────────────────────────────────────────────
  var currentView  = 'dashboard';
  var prevView     = null;
  var selCustomer  = null;   // { id, name, phone }
  var fromNewJob   = false;  // true when newCustomer was opened from newJob
  var allCustomers = [];

  // ── Navigation ─────────────────────────────────────────────────────────────
  function showView(view) {
    fromNewJob = (view === 'newCustomer' && currentView === 'newJob');

    document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
    document.getElementById('view-' + view).classList.add('active');

    var topLevel = ['dashboard','customers','settings'].indexOf(view) > -1;
    prevView = topLevel ? null : currentView;
    currentView = view;

    document.getElementById('backBtn').classList.toggle('hidden', !prevView);
    document.getElementById('pageTitle').textContent = {
      dashboard:       'Dashboard',
      newJob:          'New Job',
      jobDetail:       'Job Detail',
      editPayment:     'Payment',
      newAppointment:  'Add Fitting',
      customers:       'Customers',
      newCustomer:     'New Customer',
      settings:        'Settings'
    }[view] || '';

    // Nav highlight
    ['dashboard','customers','settings'].forEach(function(n){
      var el = document.getElementById('nav-' + n);
      var active = (view === n) ||
        (n === 'dashboard' && ['newJob','jobDetail','editPayment','newAppointment'].indexOf(view) > -1) ||
        (n === 'customers' && view === 'newCustomer' && !fromNewJob);
      el.className = el.className.replace(/text-\w+-\d+/g, active ? 'text-blue-500' : 'text-gray-400');
    });

    if (view === 'dashboard') loadDashboard();
    if (view === 'customers') loadCustomers();
  }

  function goBack() {
    if (prevView) showView(prevView);
  }

  // ── RPC helper ─────────────────────────────────────────────────────────────
  function run(fn) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject){
      var call = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
      call[fn].apply(call, args);
    });
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  var toastTimer;
  function toast(msg, ms) {
    clearTimeout(toastTimer);
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.remove('hidden');
    toastTimer = setTimeout(function(){ el.classList.add('hidden'); }, ms || 3000);
  }

  // ── Format helpers ─────────────────────────────────────────────────────────
  function fmtDate(s) {
    if (!s) return '';
    return new Date(s).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function fmtDateTime(s) {
    if (!s) return '';
    return new Date(s).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  }
  function statusBadge(status) {
    if (status === 'in-progress') return '<span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">In Progress</span>';
    if (status === 'ready')       return '<span class="text-xs px-2 py-0.5 rounded-full bg-orange-100 text-orange-700">Ready</span>';
    if (status === 'picked-up')   return '<span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">Picked Up</span>';
    return '';
  }
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Dashboard ──────────────────────────────────────────────────────────────
  function loadDashboard() {
    run('getDashboardData').then(function(data){
      renderJobCards('inProgressList', data.inProgress);
      renderJobCards('readyList',      data.ready);
      renderJobCards('pickedUpList',   data.pickedUp);
      document.getElementById('readySection').classList.toggle('hidden',   !data.ready.length);
      document.getElementById('pickedUpSection').classList.toggle('hidden', !data.pickedUp.length);
    }).catch(function(e){ toast('Error loading dashboard'); });
  }

  function renderJobCards(id, jobs) {
    var el = document.getElementById(id);
    if (!jobs || !jobs.length) {
      el.innerHTML = '<p class="text-sm text-gray-400 py-1">None</p>';
      return;
    }
    el.innerHTML = jobs.map(function(j){
      return '<div onclick="openJob(\'' + esc(j['Tag #']) + '\')" ' +
        'class="bg-white rounded-xl border border-gray-200 p-3 mb-2 cursor-pointer">' +
        '<div class="flex items-center justify-between">' +
          '<div class="text-sm"><span class="font-bold">#' + esc(j['Tag #']) + '</span>' +
          '<span class="text-gray-600 ml-2">' + esc(j['Customer Name']) + '</span></div>' +
          statusBadge(j['Status']) +
        '</div>' +
        '<p class="text-xs text-gray-400 mt-1 truncate">' + esc(j['Description'] || '—') + '</p>' +
        '</div>';
    }).join('');
  }

  // ── Job Detail ─────────────────────────────────────────────────────────────
  function openJob(tagNum) {
    showView('jobDetail');
    document.getElementById('pageTitle').textContent = 'Tag #' + tagNum;
    document.getElementById('jobDetailContent').innerHTML =
      '<p class="text-sm text-gray-400 py-10 text-center">Loading…</p>';

    Promise.all([
      run('getJob', String(tagNum)),
      run('getAppointmentsForJob', String(tagNum))
    ]).then(function(res){
      var job   = res[0];
      var appts = res[1];
      if (!job) {
        document.getElementById('jobDetailContent').innerHTML = '<p class="text-red-500">Job not found.</p>';
        return;
      }
      renderJobDetail(job, appts);
    }).catch(function(){ toast('Error loading job'); });
  }

  function renderJobDetail(job, appts) {
    var tag = job['Tag #'];

    var apptHtml = !appts.length
      ? '<p class="text-sm text-gray-400">No fittings yet</p>'
      : appts.map(function(a){
          return '<div class="flex gap-2 py-2 border-b border-gray-100 last:border-0">' +
            '<div class="w-1.5 h-1.5 rounded-full bg-blue-400 mt-1.5 flex-shrink-0"></div>' +
            '<div><p class="text-sm font-medium">' + esc(a['Type']) + '</p>' +
            '<p class="text-xs text-gray-500">' + fmtDateTime(a['Date/Time']) + '</p>' +
            (a['Notes'] ? '<p class="text-xs text-gray-400">' + esc(a['Notes']) + '</p>' : '') +
            '</div></div>';
        }).join('');

    var statusButtons = ['in-progress','ready','picked-up']
      .filter(function(s){ return s !== job['Status']; })
      .map(function(s){
        var labels = { 'in-progress':'In Progress', 'ready':'Mark Ready', 'picked-up':'Picked Up' };
        var colors = { 'in-progress':'border-blue-300 text-blue-600', 'ready':'border-orange-300 text-orange-600', 'picked-up':'border-gray-300 text-gray-600' };
        return '<button onclick="changeStatus(\'' + esc(tag) + '\',\'' + s + '\')" ' +
          'class="text-xs px-3 py-1.5 rounded-lg border ' + colors[s] + '">' + labels[s] + '</button>';
      }).join('');

    var notifySection = job['Status'] === 'ready'
      ? '<div class="bg-orange-50 border border-orange-200 rounded-2xl p-4 space-y-2">' +
          '<p class="text-sm font-semibold text-orange-800">Notify Customer</p>' +
          '<p class="text-xs text-orange-600">"Hi ' + esc(job['Customer Name']) + '! Your alterations (tag #' + esc(tag) + ') are ready for pickup."</p>' +
          '<button onclick="confirmSendText(\'' + esc(tag) + '\')" ' +
          'class="w-full bg-orange-500 text-white rounded-xl py-2.5 text-sm font-semibold">Send Text</button>' +
          '</div>'
      : '';

    document.getElementById('jobDetailContent').innerHTML =
      '<div class="space-y-3">' +

      // Status
      '<div class="bg-white rounded-2xl border border-gray-200 p-4">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<p class="text-sm font-medium text-gray-500">Status</p>' + statusBadge(job['Status']) +
        '</div>' +
        '<div class="flex gap-2 flex-wrap">' + statusButtons + '</div>' +
      '</div>' +

      // Info
      '<div class="bg-white rounded-2xl border border-gray-200 p-4 space-y-2 text-sm">' +
        row('Customer', esc(job['Customer Name'])) +
        (job['Phone'] ? '<div class="flex justify-between"><span class="text-gray-500">Phone</span><a href="tel:' + esc(job['Phone']) + '" class="text-blue-500">' + esc(job['Phone']) + '</a></div>' : '') +
        row('Date', fmtDate(job['Date'])) +
        (job['Referred From'] ? row('Referred', esc(job['Referred From']) + (job['Referred By'] ? ' (' + esc(job['Referred By']) + ')' : '')) : '') +
      '</div>' +

      // Description
      '<div class="bg-white rounded-2xl border border-gray-200 p-4">' +
        '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Description</p>' +
        '<p class="text-sm text-gray-700">' + esc(job['Description'] || '—') + '</p>' +
      '</div>' +

      // Payment
      '<div class="bg-white rounded-2xl border border-gray-200 p-4">' +
        '<div class="flex items-center justify-between mb-2">' +
          '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Payment</p>' +
          '<button onclick="openPaymentEdit(\'' + esc(tag) + '\',\'' +
            esc(job['Paid $']||'') + '\',\'' + esc(job['Payment Method']||'') + '\',\'' +
            esc(job['Tip']||'') + '\',\'' + esc(job['When Paid']||'') + '\')" ' +
          'class="text-blue-500 text-xs">Edit</button>' +
        '</div>' +
        (job['Paid $']
          ? '<div class="space-y-1 text-sm">' +
              row('Amount', '<span class="text-green-600 font-medium">$' + Number(job['Paid $']).toFixed(2) + '</span>') +
              (job['Tip'] ? row('Tip', '<span class="text-green-600">$' + Number(job['Tip']).toFixed(2) + '</span>') : '') +
              (job['Payment Method'] ? row('Method', esc(job['Payment Method'])) : '') +
              (job['When Paid'] ? row('Paid on', fmtDate(job['When Paid'])) : '') +
            '</div>'
          : '<p class="text-sm text-gray-400">Not yet paid</p>') +
      '</div>' +

      // Fittings
      '<div class="bg-white rounded-2xl border border-gray-200 p-4">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Fittings</p>' +
          '<button onclick="openNewAppt(\'' + esc(tag) + '\',\'' + esc(job['Customer Name']) + '\')" ' +
          'class="text-blue-500 text-xs">+ Add</button>' +
        '</div>' + apptHtml +
      '</div>' +

      notifySection +
      '</div>';
  }

  function row(label, val) {
    return '<div class="flex justify-between"><span class="text-gray-500">' + label + '</span><span>' + val + '</span></div>';
  }

  function changeStatus(tagNum, status) {
    run('updateJob', String(tagNum), { status: status }).then(function(){
      toast('Status updated');
      openJob(tagNum);
    });
  }

  function confirmSendText(tagNum) {
    if (confirm('Send pickup text to customer?')) {
      toast('Sending…', 8000);
      run('sendReadyText', String(tagNum)).then(function(r){
        toast(r.success ? 'Text sent!' : 'Error: ' + r.error);
      });
    }
  }

  // ── Payment ────────────────────────────────────────────────────────────────
  function openPaymentEdit(tagNum, amount, method, tip, date) {
    document.getElementById('pay-tagNum').value  = tagNum;
    document.getElementById('pay-amount').value  = amount  || '';
    document.getElementById('pay-method').value  = method  || '';
    document.getElementById('pay-tip').value     = tip     || '';
    document.getElementById('pay-date').value    = date ? String(date).split('T')[0] : new Date().toISOString().split('T')[0];
    showView('editPayment');
  }

  function submitPayment(e) {
    e.preventDefault();
    var tagNum = document.getElementById('pay-tagNum').value;
    run('updateJob', tagNum, {
      paid:          parseFloat(document.getElementById('pay-amount').value) || 0,
      paymentMethod: document.getElementById('pay-method').value,
      tip:           parseFloat(document.getElementById('pay-tip').value) || 0,
      whenPaid:      document.getElementById('pay-date').value
    }).then(function(){
      toast('Payment saved');
      showView('jobDetail');
      openJob(tagNum);
    });
  }

  // ── New Job ────────────────────────────────────────────────────────────────
  function toggleReferredBy() {
    var show = document.getElementById('job-referredFrom').value === 'Person';
    document.getElementById('referredByField').classList.toggle('hidden', !show);
  }

  function searchCustomersInline(query) {
    var drop = document.getElementById('customerDropdown');
    if (!query || query.length < 2) { drop.classList.add('hidden'); return; }
    run('searchCustomers', query).then(function(results){
      if (!results.length) { drop.classList.add('hidden'); return; }
      drop.classList.remove('hidden');
      drop.innerHTML = results.map(function(c){
        return '<div onclick="pickCustomer(\'' + esc(c['ID']) + '\',\'' +
          esc(c['Name']) + '\',\'' + esc(c['Phone']||'') + '\')" ' +
          'class="px-3 py-2.5 text-sm border-b border-gray-100 last:border-0 cursor-pointer active:bg-gray-50">' +
          '<span class="font-medium">' + esc(c['Name']) + '</span>' +
          (c['Phone'] ? '<span class="text-gray-500 ml-2 text-xs">' + esc(c['Phone']) + '</span>' : '') +
          '</div>';
      }).join('');
    });
  }

  function pickCustomer(id, name, phone) {
    selCustomer = { id:id, name:name, phone:phone };
    document.getElementById('job-customerSearch').value = name;
    document.getElementById('customerDropdown').classList.add('hidden');
    document.getElementById('selectedCustomerBadge').classList.remove('hidden');
    document.getElementById('selCustName').textContent  = name;
    document.getElementById('selCustPhone').textContent = phone;
  }

  function clearSelectedCustomer() {
    selCustomer = null;
    document.getElementById('job-customerSearch').value = '';
    document.getElementById('selectedCustomerBadge').classList.add('hidden');
  }

  function submitNewJob(e) {
    e.preventDefault();
    var btn = document.getElementById('newJobSubmitBtn');
    btn.disabled = true; btn.textContent = 'Creating…';
    run('addJob', {
      tagNumber:    document.getElementById('job-tagNumber').value.trim(),
      customerId:   selCustomer ? selCustomer.id : '',
      customerName: selCustomer ? selCustomer.name : document.getElementById('job-customerSearch').value.trim(),
      phone:        selCustomer ? selCustomer.phone : '',
      description:  document.getElementById('job-description').value.trim(),
      referredFrom: document.getElementById('job-referredFrom').value,
      referredBy:   document.getElementById('job-referredBy').value.trim()
    }).then(function(){
      toast('Job created!');
      document.getElementById('newJobForm').reset();
      document.getElementById('referredByField').classList.add('hidden');
      clearSelectedCustomer();
      btn.disabled = false; btn.textContent = 'Create Job';
      showView('dashboard');
    }).catch(function(err){
      toast('Error: ' + err.message);
      btn.disabled = false; btn.textContent = 'Create Job';
    });
  }

  // ── Appointments ───────────────────────────────────────────────────────────
  function openNewAppt(tagNum, customerName) {
    document.getElementById('appt-tagNum').value        = tagNum;
    document.getElementById('appt-customerName').value  = customerName;
    document.getElementById('appt-notes').value         = '';
    var d = new Date(); d.setDate(d.getDate()+1); d.setHours(10,0,0,0);
    document.getElementById('appt-datetime').value = d.toISOString().slice(0,16);
    showView('newAppointment');
  }

  function submitNewAppointment(e) {
    e.preventDefault();
    var tagNum = document.getElementById('appt-tagNum').value;
    run('addAppointment', {
      tagNum:       tagNum,
      customerName: document.getElementById('appt-customerName').value,
      type:         document.getElementById('appt-type').value,
      dateTime:     document.getElementById('appt-datetime').value,
      notes:        document.getElementById('appt-notes').value
    }).then(function(){
      toast('Fitting added to calendar!');
      showView('jobDetail');
      openJob(tagNum);
    }).catch(function(err){ toast('Error: ' + err.message); });
  }

  // ── Customers ──────────────────────────────────────────────────────────────
  function loadCustomers() {
    run('getCustomers').then(function(list){
      allCustomers = list;
      renderCustomerList(list);
    });
  }

  function renderCustomerList(list) {
    var el = document.getElementById('customerListEl');
    if (!list.length) {
      el.innerHTML = '<p class="text-sm text-gray-400 py-4 text-center">No customers yet</p>';
      return;
    }
    el.innerHTML = list.map(function(c){
      return '<div class="bg-white rounded-xl border border-gray-200 p-3 mb-2">' +
        '<p class="font-medium text-sm">' + esc(c['Name']) + '</p>' +
        (c['Phone'] ? '<a href="tel:' + esc(c['Phone']) + '" class="text-blue-500 text-xs">' + esc(c['Phone']) + '</a>' : '') +
        (c['Email'] ? '<p class="text-gray-400 text-xs">' + esc(c['Email']) + '</p>' : '') +
        '</div>';
    }).join('');
  }

  function filterCustomers(q) {
    if (!q) { renderCustomerList(allCustomers); return; }
    q = q.toLowerCase();
    renderCustomerList(allCustomers.filter(function(c){
      return String(c['Name']).toLowerCase().includes(q) || String(c['Phone']).includes(q);
    }));
  }

  function submitNewCustomer(e) {
    e.preventDefault();
    run('addCustomer', {
      name:  document.getElementById('cust-name').value.trim(),
      phone: document.getElementById('cust-phone').value.trim(),
      email: document.getElementById('cust-email').value.trim(),
      notes: document.getElementById('cust-notes').value.trim()
    }).then(function(customer){
      toast('Customer added!');
      document.getElementById('newCustomerForm').reset();
      if (fromNewJob) {
        pickCustomer(customer.id, customer.name, customer.phone || '');
        showView('newJob');
      } else {
        showView('customers');
      }
    }).catch(function(err){ toast('Error: ' + err.message); });
  }

  // ── Settings ───────────────────────────────────────────────────────────────
  function saveShopName() {
    var name = document.getElementById('set-shopName').value.trim();
    if (!name) return;
    run('saveShopName', name).then(function(){ toast('Saved!'); });
  }

  function saveTwilio() {
    var sid   = document.getElementById('set-twilioSid').value.trim();
    var token = document.getElementById('set-twilioToken').value.trim();
    var phone = document.getElementById('set-twilioPhone').value.trim();
    if (!sid || !token || !phone) { toast('Please fill in all three fields'); return; }
    run('saveTwilioConfig', sid, token, phone).then(function(){ toast('Twilio settings saved!'); });
  }

  function runSetup() {
    if (!confirm('This will create a new Google Sheet and Alterations calendar. Continue?')) return;
    toast('Setting up… this may take a moment', 15000);
    run('setup').then(function(result){
      toast('Setup complete!');
      alert('Done!\n\nSpreadsheet: ' + result.spreadsheetUrl + '\nCalendar ID: ' + result.calendarId);
    }).catch(function(err){ toast('Setup error: ' + err.message); });
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadDashboard();
  </script>
</body>
</html>
